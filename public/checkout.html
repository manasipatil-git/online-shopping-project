<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout ⚡ ShopEasy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--neon:#c8f73a;--hot:#ff3cac;--ink:#0a0a0a;--card:#111115;--surface:#18181d;--muted:#8888a0;--border:rgba(255,255,255,.07);--fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--ink);color:#fff;font-family:var(--fb);min-height:100vh;}

        header{display:flex;justify-content:space-between;align-items:center;padding:0 32px;height:60px;background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
        .logo{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--neon);letter-spacing:-1px;}
        nav a{color:var(--muted);text-decoration:none;padding:6px 14px;border-radius:8px;font-size:14px;font-weight:500;transition:.2s;}
        nav a:hover{color:#fff;background:rgba(255,255,255,.06);}

        main{max-width:1060px;margin:0 auto;padding:40px 32px;}
        .page-title{font-family:var(--fd);font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:30px;}

        /* LAYOUT */
        .co-layout{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start;}
        @media(max-width:860px){.co-layout{grid-template-columns:1fr;}}

        /* PANEL */
        .co-panel{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px;}
        .co-panel-title{font-family:var(--fd);font-size:15px;font-weight:800;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);}

        /* INPUTS — CRITICAL: all must be pointer-events auto, z-index normal */
        .co-input{
            display:block;
            width:100%;
            padding:12px 16px;
            margin-bottom:12px;
            background:var(--surface);
            border:1.5px solid var(--border);
            border-radius:12px;
            font-size:14px;
            color:#fff;
            font-family:var(--fb);
            outline:none;
            transition:border-color .2s,background .2s;
            -webkit-appearance:none;
            appearance:none;
            position:relative;
            z-index:1;
        }
        .co-input::placeholder{color:var(--muted);}
        .co-input:focus{border-color:var(--neon);background:rgba(200,247,58,.03);}
        .co-input.err{border-color:var(--hot);}

        .input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .input-row .co-input{margin-bottom:0;}

        /* PAYMENT OPTIONS */
        .pay-opts{display:flex;flex-direction:column;gap:10px;}
        .pay-opt{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;cursor:pointer;transition:.2s;position:relative;z-index:1;}
        .pay-opt:hover{border-color:rgba(200,247,58,.3);}
        .pay-opt.selected{border-color:var(--neon);background:rgba(200,247,58,.05);}
        .pay-opt input[type=radio]{accent-color:var(--neon);width:16px;height:16px;cursor:pointer;flex-shrink:0;}
        .pay-icon{font-size:22px;}
        .pay-lbl{font-size:14px;font-weight:700;color:#fff;font-family:var(--fd);}
        .pay-sub{font-size:12px;color:var(--muted);}

        /* ORDER SUMMARY PANEL */
        .sum-panel{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;position:sticky;top:80px;}
        .sum-title{font-family:var(--fd);font-size:15px;font-weight:800;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}

        /* ORDER ITEMS */
        .ord-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);}
        .ord-item:last-of-type{border-bottom:none;}
        .ord-emoji{width:44px;height:44px;border-radius:10px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
        .ord-info{flex:1;}
        .ord-name{font-size:13px;font-weight:600;color:#fff;}
        .ord-qty{font-size:12px;color:var(--muted);margin-top:2px;}
        .ord-price{font-size:14px;font-weight:700;color:var(--neon);font-family:var(--fd);}

        /* CALC ROWS */
        .calc-rows{margin-top:14px;}
        .calc-row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);padding:5px 0;}
        .calc-row span:last-child{color:#fff;font-weight:600;}
        .calc-div{border-top:1px solid var(--border);margin:10px 0;}
        .calc-total{display:flex;justify-content:space-between;align-items:center;padding:4px 0;}
        .calc-total-lbl{font-family:var(--fd);font-size:15px;font-weight:800;color:#fff;}
        .calc-total-val{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--neon);}

        /* PLACE ORDER BTN */
        .place-btn{width:100%;padding:15px;background:var(--neon);color:var(--ink);border:none;border-radius:14px;font-family:var(--fd);font-size:15px;font-weight:800;cursor:pointer;margin-top:18px;transition:.2s;letter-spacing:-.2px;}
        .place-btn:hover{background:#d8ff4a;transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,247,58,.25);}
        .place-btn:active{transform:scale(.98);}
        .place-btn:disabled{background:var(--surface);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none;}
        .secure-note{text-align:center;font-size:12px;color:var(--muted);margin-top:12px;}

        /* ERROR */
        .co-error{background:rgba(255,60,172,.1);border:1px solid rgba(255,60,172,.25);color:var(--hot);padding:10px 14px;border-radius:10px;font-size:13px;margin-top:12px;display:none;}

        /* SUCCESS */
        .success-wrap{max-width:600px;margin:0 auto;text-align:center;}
        .success-anim{width:84px;height:84px;background:rgba(200,247,58,.15);border:2px solid rgba(200,247,58,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 24px;animation:popIn .4s ease;}
        @keyframes popIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
        .success-title{font-family:var(--fd);font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:8px;}
        .order-id-badge{display:inline-block;background:var(--surface);color:var(--muted);font-size:13px;font-weight:600;padding:5px 16px;border-radius:100px;margin-bottom:28px;border:1px solid var(--border);}

        .s-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px;text-align:left;}
        .s-card h4{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;}

        .dinfo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .dinfo{background:var(--surface);border-radius:12px;padding:14px;}
        .dinfo-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
        .dinfo-val{font-size:14px;font-weight:700;color:#fff;font-family:var(--fd);}

        .tracking{display:flex;flex-direction:column;}
        .track-step{display:flex;gap:14px;align-items:flex-start;position:relative;}
        .track-step:not(:last-child)::after{content:'';position:absolute;left:15px;top:34px;width:2px;height:calc(100% - 8px);background:var(--border);}
        .track-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;z-index:1;}
        .track-dot.done{background:rgba(200,247,58,.15);border:1px solid rgba(200,247,58,.3);}
        .track-dot.active{background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.3);}
        .track-dot.pending{background:var(--surface);border:1px solid var(--border);}
        .track-info{padding:6px 0 22px;}
        .track-lbl{font-size:14px;font-weight:600;color:#fff;}
        .track-sub{font-size:12px;color:var(--muted);margin-top:2px;}
        .track-sub.live{color:#00d4ff;font-weight:500;}

        .s-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}
        .s-item:last-child{border-bottom:none;}
        .s-emoji{width:40px;height:40px;background:var(--surface);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
        .s-name{font-size:14px;font-weight:600;flex:1;color:#fff;}
        .s-qty{font-size:12px;color:var(--muted);}
        .s-price{font-size:14px;font-weight:800;color:var(--neon);font-family:var(--fd);}

        .success-actions{display:flex;gap:12px;justify-content:center;margin-top:8px;}
        .btn-solid{background:var(--neon);color:var(--ink);padding:13px 28px;border-radius:12px;text-decoration:none;font-weight:800;font-size:14px;font-family:var(--fd);transition:.2s;display:inline-flex;align-items:center;}
        .btn-solid:hover{background:#d8ff4a;}
        .btn-outline{background:transparent;color:var(--neon);border:1.5px solid rgba(200,247,58,.3);padding:13px 28px;border-radius:12px;text-decoration:none;font-weight:700;font-size:14px;transition:.2s;display:inline-flex;align-items:center;}
        .btn-outline:hover{background:rgba(200,247,58,.06);}

        @media(max-width:600px){main{padding:20px 16px;}header{padding:0 16px;}.dinfo-grid{grid-template-columns:1fr;}.success-actions{flex-direction:column;}}
    </style>
</head>
<body>

<header>
    <span class="logo">⚡ ShopEasy</span>
    <nav>
        <a href="index.html">Home</a>
        <a href="cart.html">← Back to Cart</a>
    </nav>
</header>

<main id="co-main">
    <h2 class="page-title">Checkout</h2>

    <div class="co-layout">
        <!-- LEFT: forms -->
        <div>
            <!-- Shipping -->
            <div class="co-panel">
                <div class="co-panel-title">📦 Shipping Details</div>
                <input id="c-name"    class="co-input" type="text"  placeholder="Full name" autocomplete="name">
                <input id="c-phone"   class="co-input" type="tel"   placeholder="Mobile number (10 digits)" autocomplete="tel">
                <input id="c-address" class="co-input" type="text"  placeholder="Flat / House no., Street, Area" autocomplete="street-address">
                <div class="input-row" style="margin-bottom:12px;">
                    <input id="c-city" class="co-input" type="text" placeholder="City" autocomplete="address-level2">
                    <input id="c-pin"  class="co-input" type="text" placeholder="PIN code" inputmode="numeric" maxlength="6" autocomplete="postal-code">
                </div>
                <input id="c-state" class="co-input" type="text" placeholder="State" autocomplete="address-level1">
            </div>

            <!-- Payment -->
            <div class="co-panel">
                <div class="co-panel-title">💳 Payment Method</div>
                <div class="pay-opts">
                    <label class="pay-opt selected" id="opt-upi">
                        <input type="radio" name="payment" value="UPI" checked onchange="selPay(this)">
                        <span class="pay-icon">📱</span>
                        <div><div class="pay-lbl">UPI</div><div class="pay-sub">Google Pay, PhonePe, Paytm</div></div>
                    </label>
                    <label class="pay-opt" id="opt-card">
                        <input type="radio" name="payment" value="Card" onchange="selPay(this)">
                        <span class="pay-icon">💳</span>
                        <div><div class="pay-lbl">Debit / Credit Card</div><div class="pay-sub">Visa, Mastercard, RuPay</div></div>
                    </label>
                    <label class="pay-opt" id="opt-nb">
                        <input type="radio" name="payment" value="Net Banking" onchange="selPay(this)">
                        <span class="pay-icon">🏦</span>
                        <div><div class="pay-lbl">Net Banking</div><div class="pay-sub">All major banks supported</div></div>
                    </label>
                    <label class="pay-opt" id="opt-cod">
                        <input type="radio" name="payment" value="Cash on Delivery" onchange="selPay(this)">
                        <span class="pay-icon">💵</span>
                        <div><div class="pay-lbl">Cash on Delivery</div><div class="pay-sub">Pay when your order arrives</div></div>
                    </label>
                </div>
            </div>
        </div>

        <!-- RIGHT: order summary -->
        <div class="sum-panel">
            <div class="sum-title">🧾 Order Summary</div>
            <div id="ord-items"></div>
            <div class="calc-rows" id="calc-rows"></div>
            <div class="co-error" id="co-err"></div>
            <button class="place-btn" id="place-btn" onclick="placeOrder()">Place Order ✓</button>
            <div class="secure-note">🔒 Safe and secure payments</div>
        </div>
    </div>
</main>

<script>
const GST = {"Electronics":.18,"Accessories":.18,"Clothing":.05,"Books":.00,"Home & Kitchen":.12,"default":.18};
function gstRate(cat){ return GST[cat]??GST.default; }

const cart = JSON.parse(localStorage.getItem('cart')||'[]');
if (!cart.length) { window.location.href='cart.html'; }

// Render order items
function renderItems() {
    const container = document.getElementById('ord-items');
    container.innerHTML = cart.map(item => `
        <div class="ord-item">
            <div class="ord-emoji">${item.emoji||'📦'}</div>
            <div class="ord-info">
                <div class="ord-name">${item.name}</div>
                <div class="ord-qty">Qty: ${item.qty}</div>
            </div>
            <div class="ord-price">₹${(item.price*item.qty).toLocaleString()}</div>
        </div>`).join('');

    const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
    const totalGst = cart.reduce((s,i)=>s+Math.round(i.price*i.qty*gstRate(i.category)),0);
    const savings  = cart.reduce((s,i)=>s+(i.originalPrice?(i.originalPrice-i.price)*i.qty:0),0);
    const total    = subtotal+totalGst;

    document.getElementById('calc-rows').innerHTML = `
        <div class="calc-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
        <div class="calc-row"><span>GST</span><span>₹${totalGst.toLocaleString()}</span></div>
        <div class="calc-row"><span>Delivery</span><span style="color:var(--neon)">FREE</span></div>
        ${savings>0?`<div class="calc-row"><span>You save</span><span style="color:#4ade80">−₹${savings.toLocaleString()}</span></div>`:''}
        <div class="calc-div"></div>
        <div class="calc-total">
            <span class="calc-total-lbl">Total</span>
            <span class="calc-total-val">₹${total.toLocaleString()}</span>
        </div>`;
}

function selPay(radio) {
    document.querySelectorAll('.pay-opt').forEach(el=>el.classList.remove('selected'));
    radio.closest('.pay-opt').classList.add('selected');
}

function validate() {
    const fields = ['c-name','c-phone','c-address','c-city','c-pin','c-state'];
    let ok = true;
    fields.forEach(id=>{
        const el=document.getElementById(id);
        if(!el) return;
        el.classList.remove('err');
        if(!el.value.trim()){ el.classList.add('err'); ok=false; }
    });
    const pin = document.getElementById('c-pin').value.trim();
    if(pin && !/^\d{6}$/.test(pin)){ document.getElementById('c-pin').classList.add('err'); ok=false; }
    const phone = document.getElementById('c-phone').value.trim();
    if(phone && !/^\d{10}$/.test(phone)){ document.getElementById('c-phone').classList.add('err'); ok=false; }
    return ok;
}

async function placeOrder() {
    const errBox = document.getElementById('co-err');
    errBox.style.display = 'none';

    if (!validate()) {
        errBox.textContent = 'Please fill in all shipping details correctly.';
        errBox.style.display = 'block';
        errBox.scrollIntoView({behavior:'smooth',block:'nearest'});
        return;
    }

    const name    = document.getElementById('c-name').value.trim();
    const phone   = document.getElementById('c-phone').value.trim();
    const address = document.getElementById('c-address').value.trim();
    const city    = document.getElementById('c-city').value.trim();
    const pin     = document.getElementById('c-pin').value.trim();
    const state   = document.getElementById('c-state').value.trim();
    const payment = document.querySelector('input[name="payment"]:checked').value;
    const shipping_address = `${name}, ${address}, ${city}, ${state} – ${pin}`;

    const btn = document.getElementById('place-btn');
    btn.textContent = 'Placing your order…';
    btn.disabled = true;

    const token = localStorage.getItem('token');
    if (token) {
        try {
            const res = await fetch('/api/orders/place',{
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
                body:JSON.stringify({shipping_address,payment_method:payment})
            });
            const data = await res.json();
            if (!res.ok) {
                errBox.textContent = data.error||'Order failed. Please try again.';
                errBox.style.display = 'block';
                btn.textContent = 'Place Order ✓';
                btn.disabled = false;
                return;
            }
        } catch { /* API unavailable — continue for demo */ }
    }

    localStorage.removeItem('cart');
    const orderId = 'SE' + Date.now().toString().slice(-8);
    const today   = new Date();
    const earliest = new Date(today); earliest.setDate(today.getDate()+3);
    const latest   = new Date(today); latest.setDate(today.getDate()+5);
    const fmt = d => d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    const deliveryWindow = `${fmt(earliest)} – ${fmt(latest)}`;

    showSuccess({orderId,name,phone,address,city,state,pin,payment,deliveryWindow});
}

function showSuccess({orderId,name,address,city,state,pin,payment,deliveryWindow}) {
    const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
    const totalGst = cart.reduce((s,i)=>s+Math.round(i.price*i.qty*gstRate(i.category)),0);
    const total    = subtotal+totalGst;
    const today    = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});

    const itemsHtml = cart.map(item=>`
        <div class="s-item">
            <div class="s-emoji">${item.emoji||'📦'}</div>
            <div>
                <div class="s-name">${item.name}</div>
                <div class="s-qty">Qty: ${item.qty}</div>
            </div>
            <div class="s-price">₹${(item.price*item.qty).toLocaleString()}</div>
        </div>`).join('');

    document.getElementById('co-main').innerHTML = `
        <div class="success-wrap">
            <div class="success-anim">✓</div>
            <h2 class="success-title">Order Placed!</h2>
            <span class="order-id-badge">Order ID: ${orderId}</span>

            <div class="s-card">
                <h4>Delivery Info</h4>
                <div class="dinfo-grid">
                    <div class="dinfo"><div class="dinfo-lbl">Estimated delivery</div><div class="dinfo-val">${deliveryWindow}</div></div>
                    <div class="dinfo"><div class="dinfo-lbl">Payment</div><div class="dinfo-val">${payment}</div></div>
                    <div class="dinfo"><div class="dinfo-lbl">Order date</div><div class="dinfo-val">${today}</div></div>
                    <div class="dinfo"><div class="dinfo-lbl">Total paid</div><div class="dinfo-val">₹${total.toLocaleString()}</div></div>
                </div>
                <div style="margin-top:14px;padding:12px 16px;background:var(--surface);border-radius:10px;font-size:13px;color:var(--muted);">
                    📍 Delivering to: ${address}, ${city}, ${state} – ${pin}
                </div>
            </div>

            <div class="s-card">
                <h4>Order Tracking</h4>
                <div class="tracking">
                    <div class="track-step"><div class="track-dot done">✓</div><div class="track-info"><div class="track-lbl">Order confirmed</div><div class="track-sub live">Just now</div></div></div>
                    <div class="track-step"><div class="track-dot active">📦</div><div class="track-info"><div class="track-lbl">Preparing your order</div><div class="track-sub live">In progress</div></div></div>
                    <div class="track-step"><div class="track-dot pending">🚚</div><div class="track-info"><div class="track-lbl">Shipped</div><div class="track-sub">Expected in 1–2 days</div></div></div>
                    <div class="track-step"><div class="track-dot pending">🏠</div><div class="track-info"><div class="track-lbl">Out for delivery</div><div class="track-sub">—</div></div></div>
                    <div class="track-step"><div class="track-dot pending">🎉</div><div class="track-info"><div class="track-lbl">Delivered</div><div class="track-sub">${deliveryWindow}</div></div></div>
                </div>
            </div>

            <div class="s-card">
                <h4>Items Ordered</h4>
                ${itemsHtml}
                <div style="display:flex;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-family:var(--fd);font-weight:800;font-size:16px;">
                    <span>Total paid</span><span style="color:var(--neon)">₹${total.toLocaleString()}</span>
                </div>
            </div>

            <div class="success-actions">
                <a href="index.html" class="btn-solid">Continue Shopping</a>
                <a href="orders.html" class="btn-outline">My Orders</a>
            </div>
        </div>`;

    window.scrollTo({top:0,behavior:'smooth'});
}

renderItems();
</script>
</body>
</html>
