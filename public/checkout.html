<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout – ShopEasy</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Checkout page specific ───────────────── */
        .checkout-layout {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 28px;
            align-items: start;
        }
        @media (max-width: 820px) {
            .checkout-layout { grid-template-columns: 1fr; }
        }

        .checkout-panel {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .checkout-panel h3 {
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f1f5f9;
        }

        .checkout-input {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            background: #f8fafc;
            box-sizing: border-box;
        }
        .checkout-input:focus {
            border-color: #3b82f6;
            background: white;
        }
        .checkout-input.err { border-color: #ef4444; }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .payment-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .payment-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            font-size: 14px;
            color: #1e293b;
        }
        .payment-option:hover { border-color: #93c5fd; background: #f0f9ff; }
        .payment-option input[type="radio"] { accent-color: #2563eb; width: 16px; height: 16px; }
        .payment-option.selected { border-color: #2563eb; background: #eff6ff; }
        .payment-icon { font-size: 20px; }
        .payment-label { font-weight: 600; font-size: 14px; }
        .payment-desc  { font-size: 12px; color: #64748b; }

        /* Order summary panel */
        .summary-panel {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 24px;
            position: sticky;
            top: 80px;
        }
        .summary-panel h3 {
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f1f5f9;
        }

        .order-item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f8fafc;
        }
        .order-item-emoji {
            width: 44px; height: 44px;
            border-radius: 8px;
            background: #f1f5f9;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .order-item-info { flex: 1; }
        .order-item-name  { font-size: 13px; font-weight: 600; color: #1e293b; }
        .order-item-qty   { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        .order-item-price { font-size: 14px; font-weight: 700; color: #1e293b; }

        .summary-calc {
            margin-top: 14px;
        }
        .calc-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #64748b;
            padding: 5px 0;
        }
        .calc-row.total {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            border-top: 1.5px solid #e2e8f0;
            margin-top: 8px;
            padding-top: 12px;
        }
        .calc-row .green { color: #16a34a; font-weight: 600; }

        .place-btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s, transform 0.1s;
        }
        .place-btn:hover { background: #15803d; }
        .place-btn:active { transform: scale(0.98); }
        .place-btn:disabled { background: #94a3b8; cursor: not-allowed; }

        .secure-note {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 12px;
        }

        .checkout-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        /* ── Success screen ───────────────────────── */
        .success-wrap {
            max-width: 600px;
            margin: 40px auto;
            text-align: center;
        }
        .success-anim {
            width: 80px; height: 80px;
            background: #dcfce7;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 38px;
            margin: 0 auto 24px;
            animation: popIn 0.4s ease;
        }
        @keyframes popIn {
            0%   { transform: scale(0.5); opacity: 0; }
            70%  { transform: scale(1.1); }
            100% { transform: scale(1);   opacity: 1; }
        }
        .success-title { font-size: 28px; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
        .success-orderid {
            display: inline-block;
            background: #f1f5f9;
            color: #475569;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 24px;
        }

        .success-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: left;
        }
        .success-card h4 {
            font-size: 13px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
        }

        /* Tracking timeline */
        .tracking {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .track-step {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            position: relative;
        }
        .track-step:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 15px;
            top: 32px;
            width: 2px;
            height: calc(100% - 8px);
            background: #e2e8f0;
        }
        .track-dot {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            z-index: 1;
        }
        .track-dot.done    { background: #dcfce7; }
        .track-dot.active  { background: #dbeafe; }
        .track-dot.pending { background: #f1f5f9; }
        .track-info { padding: 6px 0 20px; }
        .track-label  { font-size: 14px; font-weight: 600; color: #1e293b; }
        .track-sub    { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        .track-sub.active-text { color: #2563eb; font-weight: 500; }

        /* Delivery info row */
        .delivery-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .dinfo-box {
            background: #f8fafc;
            border-radius: 10px;
            padding: 14px;
        }
        .dinfo-label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .dinfo-value { font-size: 14px; font-weight: 600; color: #1e293b; }

        /* Ordered items in success */
        .success-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #f8fafc;
        }
        .success-item:last-child { border-bottom: none; }
        .success-item-emoji {
            width: 40px; height: 40px;
            background: #f1f5f9;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .success-item-name  { font-size: 14px; font-weight: 600; flex: 1; }
        .success-item-qty   { font-size: 12px; color: #94a3b8; }
        .success-item-price { font-size: 14px; font-weight: 700; color: #16a34a; }

        .success-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
        }
        .btn-primary {
            background: #2563eb; color: white;
            padding: 12px 28px; border-radius: 10px;
            text-decoration: none; font-weight: 600; font-size: 14px;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary {
            background: white; color: #2563eb;
            border: 1.5px solid #2563eb;
            padding: 12px 28px; border-radius: 10px;
            text-decoration: none; font-weight: 600; font-size: 14px;
            transition: background 0.2s;
        }
        .btn-secondary:hover { background: #eff6ff; }
    </style>
</head>
<body>

<header>
    <h1 class="logo">🛒 ShopEasy</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="cart.html">← Back to Cart</a>
    </nav>
</header>

<main id="checkout-main">
    <h2 class="section-title">Checkout</h2>

    <div class="checkout-layout">

        <!-- LEFT: forms -->
        <div>
            <!-- Shipping -->
            <div class="checkout-panel">
                <h3>📦 Shipping Details</h3>
                <input id="c-name"    class="checkout-input" type="text"  placeholder="Full name" />
                <input id="c-phone"   class="checkout-input" type="tel"   placeholder="Mobile number" />
                <input id="c-address" class="checkout-input" type="text"  placeholder="Flat / House no., Street, Area" />
                <div class="input-row">
                    <input id="c-city"  class="checkout-input" type="text" placeholder="City" style="margin-bottom:0;" />
                    <input id="c-pin"   class="checkout-input" type="text" placeholder="PIN code" style="margin-bottom:0;" />
                </div>
                <div style="margin-top:12px;">
                    <input id="c-state" class="checkout-input" type="text" placeholder="State" style="margin-bottom:0;" />
                </div>
            </div>

            <!-- Payment -->
            <div class="checkout-panel">
                <h3>💳 Payment Method</h3>
                <div class="payment-options">
                    <label class="payment-option selected" id="opt-upi">
                        <input type="radio" name="payment" value="UPI" checked onchange="selectPayment(this)" />
                        <span class="payment-icon">📱</span>
                        <div>
                            <div class="payment-label">UPI</div>
                            <div class="payment-desc">Google Pay, PhonePe, Paytm</div>
                        </div>
                    </label>
                    <label class="payment-option" id="opt-card">
                        <input type="radio" name="payment" value="Card" onchange="selectPayment(this)" />
                        <span class="payment-icon">💳</span>
                        <div>
                            <div class="payment-label">Debit / Credit Card</div>
                            <div class="payment-desc">Visa, Mastercard, RuPay</div>
                        </div>
                    </label>
                    <label class="payment-option" id="opt-netbanking">
                        <input type="radio" name="payment" value="Net Banking" onchange="selectPayment(this)" />
                        <span class="payment-icon">🏦</span>
                        <div>
                            <div class="payment-label">Net Banking</div>
                            <div class="payment-desc">All major banks supported</div>
                        </div>
                    </label>
                    <label class="payment-option" id="opt-cod">
                        <input type="radio" name="payment" value="Cash on Delivery" onchange="selectPayment(this)" />
                        <span class="payment-icon">💵</span>
                        <div>
                            <div class="payment-label">Cash on Delivery</div>
                            <div class="payment-desc">Pay when your order arrives</div>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        <!-- RIGHT: order summary -->
        <div class="summary-panel">
            <h3>🧾 Order Summary</h3>
            <div id="order-items"></div>
            <div class="summary-calc" id="summary-calc"></div>
            <div class="checkout-error" id="checkout-error"></div>
            <button class="place-btn" id="place-btn" onclick="placeOrder()">
                Place Order
            </button>
            <div class="secure-note">🔒 Safe and secure payments</div>
        </div>

    </div>
</main>

<script>
    const GST_RATES = {
        "Electronics":    0.18,
        "Accessories":    0.18,
        "Clothing":       0.05,
        "Books":          0.00,
        "Home & Kitchen": 0.12,
        "default":        0.18
    };

    function getGstRate(cat) {
        return GST_RATES[cat] || GST_RATES["default"];
    }

    // read cart ONCE at page load
    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
        window.location.href = 'cart.html';
    }

    // ── Render order items ────────────────────────
    function renderOrderItems() {
        const container = document.getElementById('order-items');
        container.innerHTML = '';

        cart.forEach(item => {
            const row = document.createElement('div');
            row.className = 'order-item-row';
            row.innerHTML = `
                <div class="order-item-emoji">${item.emoji || '📦'}</div>
                <div class="order-item-info">
                    <div class="order-item-name">${item.name}</div>
                    <div class="order-item-qty">Qty: ${item.qty}</div>
                </div>
                <div class="order-item-price">₹${(item.price * item.qty).toLocaleString()}</div>
            `;
            container.appendChild(row);
        });

        renderCalc();
    }

    function renderCalc() {
        const subtotal  = cart.reduce((s, i) => s + i.price * i.qty, 0);
        const totalGst  = cart.reduce((s, i) => s + Math.round(i.price * i.qty * getGstRate(i.category)), 0);
        const savings   = cart.reduce((s, i) => s + (i.originalPrice ? (i.originalPrice - i.price) * i.qty : 0), 0);
        const total     = subtotal + totalGst;

        const savingsRow = savings > 0
            ? `<div class="calc-row"><span>You save</span><span class="green">−₹${savings.toLocaleString()}</span></div>`
            : '';

        document.getElementById('summary-calc').innerHTML = `
            <div class="calc-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
            <div class="calc-row"><span>GST</span><span>₹${totalGst.toLocaleString()}</span></div>
            <div class="calc-row"><span>Delivery</span><span class="green">FREE</span></div>
            ${savingsRow}
            <div class="calc-row total"><span>Total</span><span>₹${total.toLocaleString()}</span></div>
        `;
    }

    // ── Payment option highlight ──────────────────
    function selectPayment(radio) {
        document.querySelectorAll('.payment-option').forEach(el => el.classList.remove('selected'));
        radio.closest('.payment-option').classList.add('selected');
    }

    // ── Validation ────────────────────────────────
    function validate() {
        const fields = ['c-name', 'c-phone', 'c-address', 'c-city', 'c-pin', 'c-state'];
        let ok = true;
        fields.forEach(id => {
            const el = document.getElementById(id);
            if (!el.value.trim()) {
                el.classList.add('err');
                ok = false;
            } else {
                el.classList.remove('err');
            }
        });

        const pin = document.getElementById('c-pin').value.trim();
        if (pin && !/^\d{6}$/.test(pin)) {
            document.getElementById('c-pin').classList.add('err');
            ok = false;
        }

        const phone = document.getElementById('c-phone').value.trim();
        if (phone && !/^\d{10}$/.test(phone)) {
            document.getElementById('c-phone').classList.add('err');
            ok = false;
        }

        return ok;
    }

    // ── Place order ───────────────────────────────
    async function placeOrder() {
        const errBox = document.getElementById('checkout-error');
        errBox.style.display = 'none';

        if (!validate()) {
            errBox.textContent = 'Please fill in all shipping details correctly.';
            errBox.style.display = 'block';
            errBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            return;
        }

        const name    = document.getElementById('c-name').value.trim();
        const phone   = document.getElementById('c-phone').value.trim();
        const address = document.getElementById('c-address').value.trim();
        const city    = document.getElementById('c-city').value.trim();
        const pin     = document.getElementById('c-pin').value.trim();
        const state   = document.getElementById('c-state').value.trim();
        const payment = document.querySelector('input[name="payment"]:checked').value;

        const shipping_address = `${name}, ${address}, ${city}, ${state} – ${pin}`;

        const btn = document.getElementById('place-btn');
        btn.textContent = 'Placing your order…';
        btn.disabled = true;

        const token = localStorage.getItem('token');

        if (token) {
            try {
                const res = await fetch('/api/orders/place', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ shipping_address, payment_method: payment })
                });
                const data = await res.json();
                if (!res.ok) {
                    errBox.textContent = data.error || 'Order failed. Please try again.';
                    errBox.style.display = 'block';
                    btn.textContent = 'Place Order';
                    btn.disabled = false;
                    return;
                }
            } catch {
                // API unavailable — continue for demo
            }
        }

        // ✅ Clear cart from localStorage
        localStorage.removeItem('cart');

        // generate a fake order ID
        const orderId = 'SE' + Date.now().toString().slice(-8);

        // estimated delivery: 3–5 business days from today
        const today    = new Date();
        const earliest = new Date(today); earliest.setDate(today.getDate() + 3);
        const latest   = new Date(today); latest.setDate(today.getDate() + 5);
        const fmt = d => d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
        const deliveryWindow = `${fmt(earliest)} – ${fmt(latest)}`;

        showSuccess({ orderId, name, phone, address, city, state, pin, payment, deliveryWindow });
    }

    // ── Success screen ────────────────────────────
    function showSuccess({ orderId, name, address, city, state, pin, payment, deliveryWindow }) {
        const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
        const totalGst = cart.reduce((s, i) => s + Math.round(i.price * i.qty * getGstRate(i.category)), 0);
        const total    = subtotal + totalGst;
        const today    = new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

        const itemsHtml = cart.map(item => `
            <div class="success-item">
                <div class="success-item-emoji">${item.emoji || '📦'}</div>
                <div>
                    <div class="success-item-name">${item.name}</div>
                    <div class="success-item-qty">Qty: ${item.qty}</div>
                </div>
                <div class="success-item-price">₹${(item.price * item.qty).toLocaleString()}</div>
            </div>
        `).join('');

        document.getElementById('checkout-main').innerHTML = `
            <div class="success-wrap">

                <div class="success-anim">✓</div>
                <h2 class="success-title">Order Placed!</h2>
                <span class="success-orderid">Order ID: ${orderId}</span>

                <!-- Delivery info -->
                <div class="success-card">
                    <h4>Delivery Info</h4>
                    <div class="delivery-info">
                        <div class="dinfo-box">
                            <div class="dinfo-label">Estimated delivery</div>
                            <div class="dinfo-value">${deliveryWindow}</div>
                        </div>
                        <div class="dinfo-box">
                            <div class="dinfo-label">Payment</div>
                            <div class="dinfo-value">${payment}</div>
                        </div>
                        <div class="dinfo-box">
                            <div class="dinfo-label">Order date</div>
                            <div class="dinfo-value">${today}</div>
                        </div>
                        <div class="dinfo-box">
                            <div class="dinfo-label">Total paid</div>
                            <div class="dinfo-value">₹${total.toLocaleString()}</div>
                        </div>
                    </div>
                    <div style="margin-top:14px; padding:12px 16px; background:#f8fafc; border-radius:8px; font-size:13px; color:#475569;">
                        📍 Delivering to: ${address}, ${city}, ${state} – ${pin}
                    </div>
                </div>

                <!-- Order tracking -->
                <div class="success-card">
                    <h4>Order Tracking</h4>
                    <div class="tracking">
                        <div class="track-step">
                            <div class="track-dot done">✓</div>
                            <div class="track-info">
                                <div class="track-label">Order confirmed</div>
                                <div class="track-sub active-text">Just now</div>
                            </div>
                        </div>
                        <div class="track-step">
                            <div class="track-dot active">📦</div>
                            <div class="track-info">
                                <div class="track-label">Preparing your order</div>
                                <div class="track-sub active-text">In progress</div>
                            </div>
                        </div>
                        <div class="track-step">
                            <div class="track-dot pending">🚚</div>
                            <div class="track-info">
                                <div class="track-label">Shipped</div>
                                <div class="track-sub">Expected in 1–2 days</div>
                            </div>
                        </div>
                        <div class="track-step">
                            <div class="track-dot pending">🏠</div>
                            <div class="track-info">
                                <div class="track-label">Out for delivery</div>
                                <div class="track-sub">—</div>
                            </div>
                        </div>
                        <div class="track-step">
                            <div class="track-dot pending">🎉</div>
                            <div class="track-info">
                                <div class="track-label">Delivered</div>
                                <div class="track-sub">${deliveryWindow}</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Items ordered -->
                <div class="success-card">
                    <h4>Items Ordered</h4>
                    ${itemsHtml}
                    <div style="display:flex; justify-content:space-between; margin-top:14px; padding-top:12px; border-top:1px solid #f1f5f9; font-weight:700; font-size:15px;">
                        <span>Total paid</span>
                        <span>₹${total.toLocaleString()}</span>
                    </div>
                </div>

                <div class="success-actions">
                    <a href="index.html" class="btn-primary">Continue Shopping</a>
                    <a href="orders.html" class="btn-secondary">My Orders</a>
                </div>

            </div>
        `;

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderOrderItems();
</script>

</body>
</html>
