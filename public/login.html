<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – ShopEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 class="logo">🛒 ShopEasy</h1>
        <nav>
            <a href="index.html">Home</a>
        </nav>
    </header>

    <div class="center-container">
        <div class="form-card">
            <h2>Welcome back</h2>
            <p class="form-subtitle">Sign in to your account</p>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input id="email" class="form-input" type="email" placeholder="you@example.com" />
                <div class="form-error-msg" id="email-err">Please enter a valid email.</div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input id="password" class="form-input" type="password" placeholder="••••••••" />
                <div class="form-error-msg" id="pw-err">Password is required.</div>
            </div>

            <div class="form-error-msg" id="api-err"
                 style="margin-bottom:12px; font-size:13px; background:#fee2e2;
                        padding:10px 14px; border-radius:8px; color:#991b1b;">
            </div>

            <button id="login-btn" onclick="login()">Sign in</button>

            <div class="form-footer">
                No account? <a href="register.html">Create one</a>
            </div>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value.trim();
            const pw    = document.getElementById('password').value;

            // clear previous errors
            document.querySelectorAll('.form-error-msg').forEach(e => e.style.display = 'none');
            document.querySelectorAll('.form-input').forEach(e => e.classList.remove('error'));

            let valid = true;
            if (!email || !/\S+@\S+\.\S+/.test(email)) {
                document.getElementById('email').classList.add('error');
                document.getElementById('email-err').style.display = 'block';
                valid = false;
            }
            if (!pw) {
                document.getElementById('password').classList.add('error');
                document.getElementById('pw-err').style.display = 'block';
                valid = false;
            }
            if (!valid) return;

            const btn = document.getElementById('login-btn');
            btn.textContent = 'Signing in…';
            btn.disabled = true;

            try {
                const res  = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pw })
                });
                const data = await res.json();

                if (data.token) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/index.html';
                } else {
                    const err = document.getElementById('api-err');
                    err.textContent = 'Invalid credentials. Please try again.';
                    err.style.display = 'block';
                }
            } catch {
                const err = document.getElementById('api-err');
                err.textContent = 'Could not connect. Please try again.';
                err.style.display = 'block';
            }

            btn.textContent = 'Sign in';
            btn.disabled = false;
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    </script>

</body>
</html>
