<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <h1 class="logo">🛒 ShopEasy</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
        </nav>
    </header>

    <!-- Main -->
    <main>
        <h2 class="section-title">Your Cart</h2>
        <div id="cart-list" class="product-grid"></div>

        <!-- Total summary bar — hidden when cart is empty -->
        <div id="cart-summary" style="display:none;">
            <div class="summary-box">
                <div class="summary-rows">
                    <div class="summary-row">
                        <span class="summary-label">Items</span>
                        <span id="summary-count" class="summary-value">0</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Subtotal</span>
                        <span id="summary-subtotal" class="summary-value">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">GST (18%)</span>
                        <span id="summary-gst" class="summary-value">₹0</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-row summary-total-row">
                        <span>Total</span>
                        <span id="summary-total">₹0</span>
                    </div>
                </div>
                <button id="checkout-btn" onclick="goToCheckout()">
                    Proceed to Checkout →
                </button>
            </div>
        </div>
    </main>

    <script>
        function getCart() {
            return JSON.parse(localStorage.getItem("cart")) || [];
        }

        function saveCart(cart) {
            localStorage.setItem("cart", JSON.stringify(cart));
        }

        function loadCart() {
            renderCart(getCart());
        }

        function renderCart(items) {
            const container = document.getElementById('cart-list');
            const summary   = document.getElementById('cart-summary');
            container.innerHTML = '';

            if (items.length === 0) {
                container.innerHTML = "<p class='empty'>Your cart is empty 🛒</p>";
                summary.style.display = 'none';
                return;
            }

            items.forEach(item => {
                const div = document.createElement('div');
                div.classList.add('product-card');

                div.innerHTML = `
                    <h3>${item.name}</h3>
                    <p class="price">₹${item.price} each</p>
                    <div class="qty-row">
                        <button class="qty-btn" onclick="updateQty(${item.id}, -1)">−</button>
                        <span style="font-size:15px; font-weight:600; min-width:20px; text-align:center;">
                            ${item.qty}
                        </span>
                        <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                    </div>
                    <p class="item-subtotal">
                        Subtotal: ₹${item.price * item.qty}
                    </p>
                    <button class="remove-btn" onclick="removeFromCart(${item.id})">
                        Remove
                    </button>
                `;

                container.appendChild(div);
            });

            updateSummary(items);
            summary.style.display = 'block';
        }

        function updateSummary(items) {
            const itemCount = items.reduce((s, i) => s + i.qty, 0);
            const subtotal  = items.reduce((s, i) => s + i.price * i.qty, 0);
            const gst       = Math.round(subtotal * 0.18);
            const total     = subtotal + gst;

            document.getElementById('summary-count').textContent    = itemCount + (itemCount === 1 ? ' item' : ' items');
            document.getElementById('summary-subtotal').textContent = '₹' + subtotal.toLocaleString();
            document.getElementById('summary-gst').textContent      = '₹' + gst.toLocaleString();
            document.getElementById('summary-total').textContent    = '₹' + total.toLocaleString();
        }

        function updateQty(productId, delta) {
            let cart = getCart();
            const item = cart.find(i => i.id === productId);
            if (!item) return;
            item.qty = Math.max(1, item.qty + delta);
            saveCart(cart);
            loadCart();
        }

        function removeFromCart(productId) {
            let cart = getCart().filter(item => item.id !== productId);
            saveCart(cart);
            loadCart();
        }

        function goToCheckout() {
            if (getCart().length === 0) return;
            window.location.href = 'checkout.html';
        }

        loadCart();
    </script>

</body>
</html>
